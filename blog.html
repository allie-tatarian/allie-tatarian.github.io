<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allie Tatarian - Blog</title>
    <!-- Include your existing CSS here -->
    <style>
                :root {
            --primary-color: #4A6B6F;
            --secondary-color: #D8973C;
            --text-color: #333333;
            --background-color: #F4F4F4;
            --section-background: #FFFFFF;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1rem;
        }
        nav {
            background-color: var(--secondary-color);
            padding: 0.5rem;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0 1rem;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .main-content {
            flex: 2;
            min-width: 0;
        }
        .sidebar {
            flex: 1;
            min-width: 250px;
        }
        section, aside {
            background-color: var(--section-background);
            margin-bottom: 2rem;
            padding: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1rem;
            width: 100%;
        }
        .experience-item, .project-item {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 1.5rem;
        }
        .experience-item:last-child, .project-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .experience-item h3, .project-item h3 {
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }
        .experience-item p, .project-item p {
            margin-top: 0.5rem;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 1rem;
            }
            .main-content, .sidebar {
                flex: 1 1 100%;
            }
            section, aside {
                padding: 1rem;
            }
        }
        #blog-posts {
            max-width: 800px;
            margin: 0 auto;
        }
        .blog-post {
            margin-bottom: 2em;
            padding-bottom: 1em;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <header>
        <h1>Allie Tatarian</h1>
        <p>Data Librarian | Open Science Advocate | Research Ethics Educator</p>
    </header>
    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#experience">Experience</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#blog">Blog</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1>Blog</h1>
        <div id="blog-posts">
            <!-- Blog posts will be dynamically inserted here -->
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Allie Tatarian. All rights reserved.</p>
    </footer>

    <script>
        async function loadBlogPosts() {
            try {
                const response = await fetch('posts.json');
                const posts = await response.json();
                const blogPostsContainer = document.getElementById('blog-posts');

                posts.forEach(post => {
                    const postElement = document.createElement('article');
                    postElement.className = 'blog-post';
                    postElement.innerHTML = `
                        <h2>${post.title}</h2>
                        <p class="date">${post.date}</p>
                        <p>${post.excerpt}</p>
                        <a href="#" onclick="loadFullPost('${post.filename}'); return false;">Read more</a>
                    `;
                    blogPostsContainer.appendChild(postElement);
                });
            } catch (error) {
                console.error('Error loading blog posts:', error);
            }
        }

        async function loadFullPost(filename) {
            try {
                const response = await fetch(`posts/${filename}`);
                const postContent = await response.text();
                const blogPostsContainer = document.getElementById('blog-posts');
                blogPostsContainer.innerHTML = `<div class="full-post">${postContent}</div>`;
            } catch (error) {
                console.error('Error loading full post:', error);
            }
        }

        window.onload = loadBlogPosts;
    </script>
</body>
</html>
