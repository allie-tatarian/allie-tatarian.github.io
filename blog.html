<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allie Tatarian - Blog</title>
    <!-- Include your existing CSS here -->
    <style>
        :root {
            --primary-color: #4A6B6F;
            --secondary-color: #D8973C;
            --text-color: #333333;
            --background-color: #F4F4F4;
            --section-background: #FFFFFF;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1rem;
        }
        nav {
            background-color: var(--secondary-color);
            padding: 0.5rem;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0 1rem;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        #blog-content {
            background-color: var(--section-background);
            padding: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .blog-post-preview {
            margin-bottom: 2em;
            padding-bottom: 1em;
            border-bottom: 1px solid #e0e0e0;
        }
        .blog-post-preview:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .blog-post-preview h2, .full-post h1 {
            color: var(--primary-color);
        }
        .date {
            color: #666;
            font-style: italic;
        }
        a {
            color: var(--secondary-color);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 1rem;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Allie Tatarian</h1>
        <p>Data Librarian | Open Science Advocate | Research Ethics Educator</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#experience">Experience</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1>Blog</h1>
        <div id="blog-posts">
            <!-- Blog posts will be dynamically inserted here -->
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Allie Tatarian. All rights reserved.</p>
    </footer>

    <script>
        async function loadBlogContent() {
    console.log("loadBlogContent function called");
    const urlParams = new URLSearchParams(window.location.search);
    const postFilename = urlParams.get('post');

    try {
        if (postFilename) {
            await loadFullPost(postFilename);
        } else {
            await loadBlogPosts();
        }
    } catch (error) {
        console.error("Error in loadBlogContent:", error);
        document.getElementById('blog-content').innerHTML = `<p>Error loading blog content. Please try again later.</p>`;
    }
}

// Function to load blog posts
async function loadBlogPosts() {
    console.log("loadBlogPosts function called");
    try {
        const response = await fetch('posts.json');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const posts = await response.json();
        const blogContentContainer = document.getElementById('blog-content');
        
        if (!blogContentContainer) {
            throw new Error("Blog content container not found");
        }

        blogContentContainer.innerHTML = '<h1>Blog Posts</h1>';

        if (posts.length === 0) {
            blogContentContainer.innerHTML += '<p>No blog posts found.</p>';
            return;
        }

        posts.forEach(post => {
            const postElement = document.createElement('article');
            postElement.className = 'blog-post-preview';
            postElement.innerHTML = `
                <h2>${post.title}</h2>
                <p class="date">${post.date}</p>
                <p>${post.excerpt}</p>
                <a href="?post=${encodeURIComponent(post.filename)}">Read more</a>
            `;
            blogContentContainer.appendChild(postElement);
        });
    } catch (error) {
        console.error('Error loading blog posts:', error);
        document.getElementById('blog-content').innerHTML = `<p>Error loading blog posts. Please try again later.</p>`;
    }
}

// Function to load full post
async function loadFullPost(filename) {
    console.log("loadFullPost function called with filename:", filename);
    try {
        const response = await fetch(`posts/${filename}`);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const postContent = await response.text();
        const blogContentContainer = document.getElementById('blog-content');
        
        if (!blogContentContainer) {
            throw new Error("Blog content container not found");
        }

        // Check if marked is available
        if (typeof marked === 'undefined') {
            console.warn("marked.js is not loaded. Displaying raw Markdown.");
            blogContentContainer.innerHTML = `
                <div class="full-post">
                    <pre>${postContent}</pre>
                </div>
                <a href="blog.html">Back to all posts</a>
            `;
        } else {
            // Use marked.js to parse Markdown
            const parsedContent = marked.parse(postContent);
            blogContentContainer.innerHTML = `
                <div class="full-post">
                    ${parsedContent}
                </div>
                <a href="blog.html">Back to all posts</a>
            `;
        }
    } catch (error) {
        console.error('Error loading full post:', error);
        document.getElementById('blog-content').innerHTML = `<p>Error loading the blog post. Please try again later.</p>`;
    }
}

// Load blog content when the window loads
window.onload = loadBlogContent;

// Function to load recent posts for the main page
async function loadRecentPosts() {
    console.log("loadRecentPosts function called");
    try {
        const response = await fetch('posts.json');
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const posts = await response.json();
        const recentPostsContainer = document.getElementById('recent-posts');
        
        if (!recentPostsContainer) {
            throw new Error("Recent posts container not found");
        }

        posts.slice(0, 3).forEach(post => {
            const postElement = document.createElement('article');
            postElement.className = 'blog-post-preview';
            postElement.innerHTML = `
                <h3>${post.title}</h3>
                <p class="date">${post.date}</p>
                <p>${post.excerpt}</p>
                <a href="blog.html?post=${encodeURIComponent(post.filename)}">Read more</a>
            `;
            recentPostsContainer.appendChild(postElement);
        });
    } catch (error) {
        console.error('Error loading recent posts:', error);
        const recentPostsContainer = document.getElementById('recent-posts');
        if (recentPostsContainer) {
            recentPostsContainer.innerHTML = `<p>Error loading recent posts. Please try again later.</p>`;
        }
    }
}

// Check if we're on the main page and load recent posts if so
if (document.getElementById('recent-posts')) {
    loadRecentPosts();
}
    </script>
</body>
</html>
